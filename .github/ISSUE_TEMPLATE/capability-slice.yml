name: Task
description: Describe one goal that a single pull request can deliver.
title: "[workspace] "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Observed behavior or missing capability, with evidence and links.
    validations:
      required: true
  - type: textarea
    id: plan
    attributes:
      label: Plan
      description: The change, mapped to the cause. Note explicit non-goals.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: Executable checks (positive and negative) that prove it works.
    validations:
      required: true
