name: ci-db

on:
  workflow_call:

jobs:
  # Apply every migration + roles.sql against a throwaway Postgres — the DDL must
  # always be runnable from scratch, matching what docker-compose does locally.
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truealpha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations and roles
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql db/roles.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      # apply_migrations.sh's own header comment states every migration file "is
      # itself written to be safe to re-run" -- db/apply_migrations.sh re-applies the
      # full chain on EVERY container boot (staging/prod/preview), not just the first.
      # A single fresh-DB pass never exercises that invariant, and #455 shipped a
      # migration that silently broke it (a plain `drop constraint` with no IF
      # EXISTS, fine on the first run, ON_ERROR_STOP-fatal on every run after) --
      # crash-looping llm-service on both staging and production for days before
      # anyone noticed, because nothing tested a second pass. Re-running the exact
      # same loop here catches that class of regression before merge.
      - name: Re-apply migrations and roles (idempotency)
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql db/roles.sql; do
            echo "== $f (2nd pass)"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Assert runtime persistence contract
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f db/tests/runtime_contract.sql
      # #472: these three contract files had no execution host anywhere — written,
      # reviewed, never run (governed_research_access_contract.sql even SAID so in
      # a docstring). All are schema-level and self-seeding inside a rolled-back
      # transaction, so the freshly migrated database above is the right target.
      - name: Assert orphaned db/tests contracts
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/tests/capture_control_contract.sql \
                   db/tests/headcount_extraction_contract.sql \
                   db/tests/governed_research_access_contract.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      # #472 meta-check (#373 class): a contract test nothing runs passes no
      # signal. A file counts as hosted only when (a) a workflow or shell runner
      # names its full db/tests/ path, or (b) a Python/TS file references it AND
      # that file itself executes SQL (psql / ON_ERROR_STOP) — a prose-only
      # mention in a non-executing file no longer counts (#480 review found
      # exactly that false positive). Known residual gap, accepted and
      # documented: a prose mention inside a file that executes a DIFFERENT
      # contract still passes; tighten to an explicit host manifest if it bites.
      - name: Every db/tests file has an execution host
        run: |
          set -euo pipefail
          missing=0
          for f in db/tests/*.sql; do
            name="$(basename "$f")"
            hosted=0
            if grep -rqF -- "db/tests/$name" .github/workflows db/apply_migrations.sh 2>/dev/null; then
              hosted=1
            else
              while IFS= read -r ref; do
                if grep -qE "psql|ON_ERROR_STOP" "$ref"; then hosted=1; break; fi
              done < <(grep -rlF -- "$name" libs apps tools --include="*.py" --include="*.ts" 2>/dev/null || true)
            fi
            if [ "$hosted" -eq 0 ]; then
              echo "::error::db/tests/$name has no executing host — give it a real runner or delete it"
              missing=1
            fi
          done
          exit "$missing"
