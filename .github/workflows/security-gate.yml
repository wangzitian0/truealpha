name: security-gate

# This is a public repo touching financial-account data (moomoo). ci-required
# calls it for PRs, merge groups, main, and tags. Local pre-commit hooks are the
# immediate control; this required workflow is the non-duplicated CI backstop.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-trade-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Forbid moomoo trading APIs (quote/read-only data only)
        run: |
          set -e
          # CLAUDE.md hard constraint: this repo only ever reads moomoo market/
          # fundamental data via OpenQuoteContext. Trading contexts and order
          # calls are hard-forbidden, no exceptions — this is a public repo.
          # Word boundaries via POSIX classes, not \b — git grep -E compiles
          # with the system regcomp, where \b is a glibc extension only.
          PATTERN='OpenSecTradeContext|OpenFutureTradeContext|OpenCryptoTradeContext|OpenHKTradeContext|OpenUSTradeContext|OpenCNTradeContext|(^|[^[:alnum:]_])(place_order|modify_order|cancel_order|unlock_trade)([^[:alnum:]_]|$)'
          # Repo-wide, excluding the docs that legitimately name these APIs
          # (as things to forbid), this workflow file itself, and the
          # pre-commit config whose local gate carries the same pattern.
          if git grep -InE "$PATTERN" -- . \
              ':(exclude)CLAUDE.md' \
              ':(exclude)init.md' \
              ':(exclude).github/workflows/security-gate.yml' \
              ':(exclude).pre-commit-config.yaml'; then
            echo "::error::Forbidden moomoo trading API reference found above — this repo is quote/read-only only (see CLAUDE.md hard constraints)."
            exit 1
          fi
          echo "OK: no moomoo trading API references found."
