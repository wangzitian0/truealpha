name: security-gate

# This is a public repo touching financial-account data (moomoo). Unclaimed
# feature branches are scanned directly; open PR branches defer to ci-required
# so each commit receives one CI scan set rather than two.

on:
  workflow_call:
  push:
    branches-ignore: [main]
    tags-ignore: ["**"]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan_policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_scan: ${{ steps.policy.outputs.should_scan }}
    steps:
      - id: policy
        name: Defer open pull requests to required CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "push" || "$GITHUB_REF_NAME" == "main" || "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          open_prs=0
          if ! open_prs="$(gh api \
            "repos/$GITHUB_REPOSITORY/commits/$GITHUB_SHA/pulls?per_page=100" \
            --jq '[.[] | select(.state == "open")] | length')"; then
            echo "::warning::Could not determine pull-request coverage; scanning this branch push."
            open_prs=0
          fi

          if [[ "$open_prs" -gt 0 ]]; then
            echo "Open pull request detected; ci-required owns the scan for this commit."
            echo "should_scan=false" >> "$GITHUB_OUTPUT"
          else
            echo "No open pull request detected; scanning the public branch push."
            echo "should_scan=true" >> "$GITHUB_OUTPUT"
          fi

  secret-scan:
    if: needs.scan_policy.outputs.should_scan == 'true'
    needs: scan_policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  no-trade-api:
    if: needs.scan_policy.outputs.should_scan == 'true'
    needs: scan_policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Forbid moomoo trading APIs (quote/read-only data only)
        run: |
          set -e
          # CLAUDE.md hard constraint: this repo only ever reads moomoo market/
          # fundamental data via OpenQuoteContext. Trading contexts and order
          # calls are hard-forbidden, no exceptions — this is a public repo.
          # Word boundaries via POSIX classes, not \b — git grep -E compiles
          # with the system regcomp, where \b is a glibc extension only.
          PATTERN='OpenSecTradeContext|OpenFutureTradeContext|OpenCryptoTradeContext|OpenHKTradeContext|OpenUSTradeContext|OpenCNTradeContext|(^|[^[:alnum:]_])(place_order|modify_order|cancel_order|unlock_trade)([^[:alnum:]_]|$)'
          # Repo-wide, excluding the docs that legitimately name these APIs
          # (as things to forbid), this workflow file itself, and the
          # pre-commit config whose local gate carries the same pattern.
          if git grep -InE "$PATTERN" -- . \
              ':(exclude)CLAUDE.md' \
              ':(exclude)init.md' \
              ':(exclude).github/workflows/security-gate.yml' \
              ':(exclude).pre-commit-config.yaml'; then
            echo "::error::Forbidden moomoo trading API reference found above — this repo is quote/read-only only (see CLAUDE.md hard constraints)."
            exit 1
          fi
          echo "OK: no moomoo trading API references found."
