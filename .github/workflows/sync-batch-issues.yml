name: sync-batch-issues

on:
  workflow_call:
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, milestoned, demilestoned]

permissions:
  contents: read
  issues: write

concurrency:
  group: vision-issue-reconciliation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.event_name != 'issues' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Reconcile merged Vision issue state to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import time

          from tools.check_delivery_governance import (
              batch_status_labels,
              load_vision_graph,
              render_batch_issue_body,
          )

          graph = load_vision_graph()
          repository = os.environ["GITHUB_REPOSITORY"]

          class ApiFailure(RuntimeError):
              def __init__(self, status, output):
                  super().__init__(output)
                  self.status = status


          def api(arguments, *, input_text=None, attempts=4):
              for attempt in range(attempts):
                  response = subprocess.run(
                      ["gh", "api", *arguments],
                      input=input_text,
                      capture_output=True,
                      text=True,
                  )
                  if response.returncode == 0:
                      return response.stdout

                  output = response.stdout + response.stderr
                  statuses = re.findall(r"(?:HTTP/\S+\s+|\(HTTP\s+)(\d{3})", output)
                  status = int(statuses[-1]) if statuses else None
                  retryable = status in {403, 429, 500, 502, 503, 504}
                  if not retryable or attempt == attempts - 1:
                      raise ApiFailure(status, output)

                  delay = 2**attempt
                  if status in {403, 429}:
                      reset = re.search(r"(?im)^x-ratelimit-reset:\s*(\d+)\s*$", output)
                      if reset is None:
                          rate_limit = subprocess.run(
                              ["gh", "api", "rate_limit", "--jq", ".resources.core.reset"],
                              capture_output=True,
                              text=True,
                          )
                          if rate_limit.returncode == 0 and rate_limit.stdout.strip().isdigit():
                              reset = re.match(r"(\d+)", rate_limit.stdout.strip())
                      if reset:
                          delay = max(1, int(reset.group(1)) - int(time.time()) + 1)
                      if delay > 300:
                          raise ApiFailure(status, "rate-limit reset exceeds reconciliation budget\n" + output)
                  time.sleep(delay)
              raise AssertionError("unreachable")


          def fetch_issue(issue_number):
              endpoint = f"repos/{repository}/issues/{issue_number}"
              return json.loads(api([endpoint]))


          pages = json.loads(
              api(
                  [
                      "--paginate",
                      "--slurp",
                      f"repos/{repository}/issues?state=all&per_page=100",
                  ]
              )
          )
          issues = {
              issue["number"]: issue
              for page in pages
              for issue in page
              if "pull_request" not in issue
          }
          batches_by_issue = {
              batch["issue"]: (batch_id, batch)
              for batch_id, batch in graph["batches"].items()
          }
          expected = {
              graph["root_issue"],
              *(int(number) for number in graph["gates"]),
              *(int(number) for number in graph["issues"]),
              *batches_by_issue,
          }
          missing = sorted(expected - issues.keys())
          if missing:
              raise SystemExit(f"managed Vision issues are missing from GitHub: {missing}")

          milestone_pages = json.loads(
              api(
                  [
                      "--paginate",
                      "--slurp",
                      f"repos/{repository}/milestones?state=all&per_page=100",
                  ]
              )
          )
          milestones = {
              milestone["title"]: milestone["number"]
              for page in milestone_pages
              for milestone in page
          }

          def desired_patch(issue_number, issue):
              current_labels = {label["name"] for label in issue["labels"]}
              desired_labels = set(current_labels)
              if issue_number in expected:
                  desired_labels.add("scope:vision")
              else:
                  desired_labels.discard("scope:vision")

              desired_body = issue.get("body") or ""
              desired_state = issue["state"]
              desired_reason = issue.get("state_reason")
              desired_milestone = issue.get("milestone", {}).get("number") if issue.get("milestone") else None
              if issue_number in batches_by_issue:
                  batch_id, batch = batches_by_issue[issue_number]
                  desired_labels = {
                      label
                      for label in desired_labels
                      if not label.startswith(("batch:", "rung:", "readiness:"))
                  }
                  desired_labels.update(batch_status_labels(batch))
                  desired_body = render_batch_issue_body(desired_body, batch_id, batch)
                  lifecycle = {
                      "done": ("closed", "completed"),
                      "cancelled": ("closed", "not_planned"),
                  }
                  desired_state, desired_reason = lifecycle.get(batch["status"], ("open", None))
                  milestone_title = graph["gates"][str(batch["owner_gate"])]["milestone"]
                  if milestone_title not in milestones:
                      raise SystemExit(f"required milestone does not exist: {milestone_title}")
                  desired_milestone = milestones[milestone_title]

              changed = current_labels != desired_labels or issue.get("body") != desired_body
              current_milestone = issue.get("milestone", {}).get("number") if issue.get("milestone") else None
              changed = changed or current_milestone != desired_milestone
              changed = changed or issue["state"] != desired_state
              if desired_state == "closed":
                  changed = changed or issue.get("state_reason") != desired_reason
              if not changed:
                  return None

              payload = json.loads(json.dumps({"body": desired_body, "labels": sorted(desired_labels)}))
              if current_milestone != desired_milestone:
                  payload["milestone"] = desired_milestone
              if issue["state"] != desired_state or (
                  desired_state == "closed" and issue.get("state_reason") != desired_reason
              ):
                  payload["state"] = desired_state
                  payload["state_reason"] = desired_reason if desired_state == "closed" else "reopened"
              return payload


          def reconcile(issue_number):
              endpoint = f"repos/{repository}/issues/{issue_number}"
              current = fetch_issue(issue_number)
              payload = desired_patch(issue_number, current)
              if payload is None:
                  return
              api(
                  [
                      "--method",
                      "PATCH",
                      endpoint,
                      "--input",
                      "-",
                  ],
                  input_text=json.dumps(payload),
              )


          for issue_number, issue in issues.items():
              if desired_patch(issue_number, issue) is not None:
                  reconcile(issue_number)

          refetched_pages = json.loads(
              api(
                  [
                      "--paginate",
                      "--slurp",
                      f"repos/{repository}/issues?state=all&per_page=100",
                  ]
              )
          )
          exported_fields = ("number", "title", "state", "state_reason", "body", "labels", "milestone")
          vision_issues = [
              {field: issue.get(field) for field in exported_fields}
              for page in refetched_pages
              for issue in page
              if "pull_request" not in issue
              and any(label["name"] == "scope:vision" for label in issue["labels"])
          ]
          output_path = os.path.join(os.environ["RUNNER_TEMP"], "vision-issues.json")
          with open(output_path, "w", encoding="utf-8") as output:
              json.dump(vision_issues, output)
          PY
      - name: Validate reconciled GitHub parity
        run: >-
          python3 tools/check_delivery_governance.py
          --github-issues "$RUNNER_TEMP/vision-issues.json"
