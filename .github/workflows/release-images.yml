name: release-images

# Builds the three deployable images. On PRs the build is validation-only; pushes
# to main (and vX.Y.Z tags) publish to GHCR, which infra2's truealpha/app
# compose pulls (IMAGE_TAG defaults to latest — see infra2 truealpha/10.app).
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish immutable branch images for a reviewed Staging candidate
        required: true
        type: boolean
        default: false
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
    paths-ignore:
      - "**.md"
  pull_request:
    paths:
      - "apps/data-engine/**"
      - "apps/app-web/**"
      - "apps/llm-service/**"
      - "db/**"
      - "libs/factors/**"
      - "libs/contracts/**"
      - "libs/runtime/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/release-images.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: truealpha-app-web
            dockerfile: apps/app-web/Dockerfile
            context: apps/app-web
          - image: truealpha-llm-service
            dockerfile: apps/llm-service/Dockerfile
            context: .
          - image: truealpha-data-engine
            dockerfile: apps/data-engine/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern=v{{version}}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - name: Record immutable image digest
        run: echo "${{ matrix.image }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
