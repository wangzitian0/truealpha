name: ci-qlib

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --project libs/factors/qlib-runtime --all-groups --frozen
      - name: Run the pinned Qlib runtime tests without optional skips
        run: >-
          uv run --project libs/factors/qlib-runtime pytest
          libs/factors/tests/batches/issuer_strategy_selection_tiny
          libs/factors/tests/batches/qlib_expression_contract_tiny -q
