name: pr-metadata

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: pr-metadata-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  governance_metadata:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: read
      pull-requests: read
    uses: ./.github/workflows/ci-governance.yml
    with:
      mode: pull_request_metadata
      pr_base_sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      pr_number: ${{ github.event.pull_request.number }}

  merge_group_metadata:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "Pull-request metadata was required before merge-queue admission."

  required:
    name: pr-metadata
    if: always()
    needs: [governance_metadata, merge_group_metadata]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require the event-appropriate metadata check
        env:
          EVENT_NAME: ${{ github.event_name }}
          GOVERNANCE_RESULT: ${{ needs.governance_metadata.result }}
          MERGE_GROUP_RESULT: ${{ needs.merge_group_metadata.result }}
        run: |
          if [ "$EVENT_NAME" = pull_request ]; then
            test "$GOVERNANCE_RESULT" = success
            test "$MERGE_GROUP_RESULT" = skipped
          else
            test "$EVENT_NAME" = merge_group
            test "$GOVERNANCE_RESULT" = skipped
            test "$MERGE_GROUP_RESULT" = success
          fi
