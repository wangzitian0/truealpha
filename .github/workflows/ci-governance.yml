name: Delivery Governance

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string
      pr_base_sha:
        required: false
        type: string
      pr_head_sha:
        required: false
        type: string
      pr_number:
        required: false
        type: number
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, milestoned, demilestoned]
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  validate:
    if: inputs.mode == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truealpha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.pr_head_sha }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install pull-request acceptance dependencies
        run: uv sync --all-packages --frozen
      - name: Prepare pull-request acceptance database
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql db/roles.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Export live Vision issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/issues?state=all&labels=scope%3Avision&per_page=100" \
            | jq -s '[.[][] | select(has("pull_request") | not) | {number, title, state, body, labels, milestone}]' \
            > "$RUNNER_TEMP/vision-issues.json"
          gh api \
            "repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr_number }}" \
            --jq '{number, title, body}' \
            > "$RUNNER_TEMP/pull-request.json"
          work_issue="$(jq -r 'try (.body | capture("(?m)^Work-Issue:[[:space:]]*#(?<issue>[0-9]+)[[:space:]]*$").issue) catch ""' "$RUNNER_TEMP/pull-request.json")"
          test -n "$work_issue"
          gh api \
            "repos/$GITHUB_REPOSITORY/issues/$work_issue" \
            --jq '{number, title, state, body, labels, milestone}' \
            > "$RUNNER_TEMP/work-issue.json"
      - name: Authorize pull-request diff
        env:
          GH_TOKEN: ${{ github.token }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/truealpha
          TRUEALPHA_REQUIRE_RUNTIME: "1"
        run: >-
          python3 tools/check_delivery_governance.py
          --github-issues "$RUNNER_TEMP/vision-issues.json"
          --github-pr "$RUNNER_TEMP/pull-request.json"
          --github-work-issue "$RUNNER_TEMP/work-issue.json"
          --pr-base-sha "${{ inputs.pr_base_sha }}"
          --pr-head-sha "${{ inputs.pr_head_sha }}"
          --execute-acceptance
          --evidence-output "$RUNNER_TEMP/rung-evidence.json"
      - name: Retain rung evidence
        uses: actions/upload-artifact@v4
        with:
          name: rung-evidence-${{ github.run_id }}
          path: ${{ runner.temp }}/rung-evidence.json
          if-no-files-found: ignore
          retention-days: 90

  validate_non_pr:
    if: >-
      inputs.mode != 'pull_request' &&
      (github.event_name != 'issues' || github.actor != 'github-actions[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Export live Vision issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "repos/$GITHUB_REPOSITORY/issues?state=all&labels=scope%3Avision&per_page=100" \
            | jq -s '[.[][] | select(has("pull_request") | not) | {number, title, state, body, labels, milestone}]' \
            > "$RUNNER_TEMP/vision-issues.json"
      - name: Validate GitHub parity
        run: >-
          python3 tools/check_delivery_governance.py
          --github-issues "$RUNNER_TEMP/vision-issues.json"
