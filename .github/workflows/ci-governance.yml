name: Delivery Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review, converted_to_draft]
  issues:
    types: [opened, edited, closed, reopened, labeled, unlabeled, milestoned, demilestoned]
  push:
    branches: [main]
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/ci-governance.yml"
      - "governance/**"
      - "tools/check_delivery_governance.py"
      - "tools/check_gate0_candidate.py"
      - "AGENTS.md"
      - "init.md"
      - "docs/iterative-delivery.md"
      - "docs/architecture-contract-closure.md"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  sync_batch_labels:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Mirror merged batch status to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess

          from tools.check_delivery_governance import batch_status_labels, render_batch_issue_body

          with open("governance/vision-issue-graph.json", encoding="utf-8") as stream:
              graph = json.load(stream)
          repository = os.environ["GITHUB_REPOSITORY"]
          for batch_id, batch in graph["batches"].items():
              desired_status = batch_status_labels(batch)
              endpoint = f"repos/{repository}/issues/{batch['issue']}"
              response = subprocess.run(
                  ["gh", "api", endpoint],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              issue = json.loads(response.stdout)
              preserved = {
                  label["name"]
                  for label in issue["labels"]
                  if not label["name"].startswith(("batch:", "rung:", "readiness:"))
              }
              desired = sorted(preserved | desired_status)
              desired_body = render_batch_issue_body(issue.get("body") or "", batch_id, batch)
              current = sorted(label["name"] for label in issue["labels"])
              if current != desired or issue.get("body") != desired_body:
                  subprocess.run(
                      ["gh", "api", "--method", "PATCH", endpoint, "--input", "-"],
                      input=json.dumps({"body": desired_body, "labels": desired}),
                      check=True,
                      text=True,
                  )
          PY

  validate:
    needs: sync_batch_labels
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      (needs.sync_batch_labels.result == 'success' || needs.sync_batch_labels.result == 'skipped')
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truealpha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install pull-request acceptance dependencies
        run: uv sync --all-packages --frozen
      - name: Prepare pull-request acceptance database
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql db/roles.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Export live Vision issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200
          --label scope:vision --json number,state,body,labels,milestone
          > "$RUNNER_TEMP/vision-issues.json"
      - name: Authorize pull-request diff
        env:
          GATE0_CANDIDATE_FLAG: ${{ github.event.pull_request.draft && '--allow-blocked-gate-candidate' || '' }}
          GH_TOKEN: ${{ github.token }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/truealpha
          TRUEALPHA_REQUIRE_RUNTIME: "1"
        run: >-
          python3 tools/check_delivery_governance.py
          --github-issues "$RUNNER_TEMP/vision-issues.json"
          --pr-base-sha "${{ github.event.pull_request.base.sha }}"
          --pr-head-sha "${{ github.event.pull_request.head.sha }}"
          --execute-acceptance
          --evidence-output "$RUNNER_TEMP/rung-evidence.json"
          $GATE0_CANDIDATE_FLAG
      - name: Retain rung evidence
        uses: actions/upload-artifact@v4
        with:
          name: rung-evidence-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/rung-evidence.json
          if-no-files-found: ignore
          retention-days: 90

  validate_non_pr:
    needs: sync_batch_labels
    if: >-
      always() &&
      github.event_name != 'pull_request' &&
      (needs.sync_batch_labels.result == 'success' || needs.sync_batch_labels.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate checked-in graph and manifests
        run: make issue-graph-check
      - name: Validate Gate 0 candidate chain
        run: make gate0-candidate-check
      - name: Export live Vision issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh issue list --repo "$GITHUB_REPOSITORY" --state all --limit 200
          --label scope:vision --json number,state,body,labels,milestone
          > "$RUNNER_TEMP/vision-issues.json"
      - name: Validate GitHub parity
        run: >-
          python3 tools/check_delivery_governance.py
          --github-issues "$RUNNER_TEMP/vision-issues.json"
