name: ci-python

on:
  push:
    branches: [main]
    paths:
      - "apps/data-engine/**"
      - "apps/llm-service/**"
      - "libs/factors/**"
      - "libs/contracts/**"
      - "libs/runtime/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "apps/data-engine/**"
      - "apps/llm-service/**"
      - "libs/factors/**"
      - "libs/contracts/**"
      - "libs/runtime/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci-python.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    # Real Postgres + MinIO so the KG / raw-store / ledger integration tests run
    # in CI instead of skipping (they skip gracefully where unreachable).
    # bitnami/minio rather than minio/minio: GitHub service containers can't
    # override the container command, and the official image needs `server /data`.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: truealpha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: bitnami/minio:2025.9.7
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio_local_secret
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-packages
      - run: uv run ruff check apps libs
      - run: uv run ruff format --check apps libs
      - name: Apply DB migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in db/migrations/*.sql db/roles.sql; do
            echo "== $f"
            psql -h localhost -U postgres -d truealpha -v ON_ERROR_STOP=1 -f "$f"
          done
      - run: uv run pytest
        env:
          APP_ENV: ci
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/truealpha
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minio
          S3_SECRET_KEY: minio_local_secret
          S3_BUCKET: truealpha-raw
