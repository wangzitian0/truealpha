services:
  postgres:
    image: postgres:15.14-alpine
    container_name: truealpha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-truealpha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Fresh dev DB gets the schemas automatically; initdb runs files in name order,
      # so roles.sql is mounted with a zz_ prefix to run after the migrations.
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - ./db/roles.sql:/docker-entrypoint-initdb.d/zz_roles.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
