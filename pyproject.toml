# Virtual workspace root — not a package itself.
# Python members share one lockfile (uv.lock) and one .venv at the repo root.

[tool.uv.workspace]
members = [
    "apps/data-engine",
    "apps/llm-service",
    "libs/contracts",
    "libs/factors",
    "libs/runtime",
]

[dependency-groups]
dev = ["mypy>=1.14"]

[tool.mypy]
python_version = "3.12"
files = [
    "apps/data-engine/src",
    "apps/llm-service/src",
    "libs/contracts/src",
    "libs/factors/src",
    "libs/runtime/src",
]
# Third-party sources without stubs (moomoo SDK, boto3's dynamic client) —
# missing-import noise, not a type-safety signal for our own code.
ignore_missing_imports = true

[tool.ruff]
line-length = 120
target-version = "py312"
# The infra2 submodule has its own tooling — linting/formatting it from here
# would dirty a foreign working tree.
extend-exclude = ["repo"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = [
    "apps/data-engine/tests",
    "apps/llm-service/tests",
    "libs/contracts/tests",
    "libs/factors/tests",
    "libs/runtime/tests",
]
