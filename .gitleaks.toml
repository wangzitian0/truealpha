# Gitleaks config (secret-scan CI + the #315 full-history recovery dispatch).
#
# The default ruleset flags governance evidence identifiers like
# "rung-evidence:<capability>:<sha256>" as generic api-keys. Those are
# content-addressed record IDs, not credentials. Allowlist exactly that shape;
# everything else keeps the default rules (CLAUDE.md red line: scanning is a
# backstop, never permission).

[extend]
useDefault = true

[allowlist]
description = "Content-addressed governance evidence identifiers are not credentials"
# Match on the whole LINE: the default regexTarget is the captured secret group,
# which for these records is an arbitrary hash fragment the id-prefix regex can
# never see (some ids even carry \u escapes or colon-joined segments).
regexTarget = "line"
regexes = [
  '''rung-evidence:''',
]
# governance/ holds append-only, content-hashed delivery records (capability
# rungs, handoffs, evidence). Their id fields (handoff:, evidence:, rung-*:)
# are hash identifiers by construction and trip the generic-api-key rule one
# prefix at a time. The tree never carries credentials (CLAUDE.md red line +
# review); allowlist the path instead of chasing each id prefix.
paths = [
  '''governance/.*''',
]
